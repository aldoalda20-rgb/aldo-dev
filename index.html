<script>
function downloadAddon(link) {
    alert("Download dimulai!");
    window.location.href = link;
}

function searchAddon() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let text = cards[i].innerText.toLowerCase();

        if (text.includes(input)) {
            cards[i].style.display = "block";
        } else {
            cards[i].style.display = "none";
        }
    }
}

function like(btn) {
    let count = btn.querySelector("span");
    let num = parseInt(count.innerText);

    if (btn.classList.contains("liked")) {
        // kalau sudah like → batalin
        btn.classList.remove("liked");
        btn.innerHTML = "🤍 <span>" + (num - 1) + "</span>";
    } else {
        // kalau belum like
        btn.classList.add("liked");
        btn.innerHTML = "❤️ <span>" + (num + 1) + "</span>";
    }
}
